name: incident-response
mock_data: incident-response.sample.json
steps:
  - id: check-metrics
    type: metrics.check
    params: {}

  - id: check-logs
    type: logs.check
    params: {}

  - id: analyze-incident
    type: llm.analyze
    params:
      prompt_template: |
        Analyze the following service incident and identify the root cause.

        Service: {{.service}}
        CPU Usage: {{.cpu_usage}}
        Error Rate: {{.error_rate}}
        P99 Latency: {{.p99_latency_ms}}ms
        PgBouncer pool size: {{.pgbouncer_pool_size}} (max connections)
        PgBouncer active connections: {{.pgbouncer_active_connections}} in use
        PgBouncer wait queue: {{.pgbouncer_wait_queue}} queries waiting

        Recent logs:
        {{range .logs}}- {{.}}
        {{end}}
        Respond with JSON only — no explanation, no markdown:
        {"root_cause": string, "severity": "critical"|"high"|"medium"|"low", "recommended_action": string}

  - id: llm-review
    type: llm.decision
    params:
      prompt_template: |
        You are an automated ops decision engine. Your job is to approve or reject a remediation action based on a prior incident analysis.

        Service: {{.service}}
        Root cause: {{index .analysis "root_cause"}}
        Severity: {{index .analysis "severity"}}
        Recommended action: {{index .analysis "recommended_action"}}
        Proposed fix: scale pgbouncer deployment in namespace data to 6 replicas.

        Decision rules:
        - Approve if severity is "critical" or "high".
        - Reject if severity is "low" or "medium".

        Respond with JSON only:
        {"approved": bool, "comment": string}

  - id: remediate
    type: remediate
    params:
      deployment: pgbouncer
      namespace: data
      replicas: 6
      endpoint: "https://k8s.internal/apis/apps/v1/namespaces/data/deployments/pgbouncer/scale"
