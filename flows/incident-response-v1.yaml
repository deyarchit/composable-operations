name: incident-response
mock_data: incident-response.sample.json
steps:
  - id: check-metrics
    type: metrics.check
    params: {}

  - id: check-logs
    type: logs.check
    params: {}

  - id: analyze-incident
    type: llm.analyze
    params:
      prompt_template: |
        Analyze the following service incident and identify the root cause.

        Service: {{.service}}
        CPU Usage: {{.cpu_usage}}
        Error Rate: {{.error_rate}}
        P99 Latency: {{.p99_latency_ms}}ms
        PgBouncer pool size: {{.pgbouncer_pool_size}} (max connections)
        PgBouncer active connections: {{.pgbouncer_active_connections}} in use
        PgBouncer wait queue: {{.pgbouncer_wait_queue}} queries waiting

        Recent logs:
        {{range .logs}}- {{.}}
        {{end}}
        Available remediation: scale the pgbouncer deployment horizontally by adding replicas to increase total connection pool capacity.

        Respond with JSON only — no explanation, no markdown:
        {"root_cause": string, "severity": "critical"|"high"|"medium"|"low", "recommended_action": string}

  - id: human-review
    type: human.approval
    params:
      prompt: "PgBouncer pool exhausted on payment-api. Review the analysis and approve or reject scaling pgbouncer to 6 replicas."
      display_fields:
        - service
        - pgbouncer_pool_size
        - pgbouncer_active_connections
        - pgbouncer_wait_queue
        - analysis

  - id: remediate
    type: remediate
    params:
      deployment: pgbouncer
      namespace: data
      replicas: 6
      endpoint: "https://k8s.internal/apis/apps/v1/namespaces/data/deployments/pgbouncer/scale"
